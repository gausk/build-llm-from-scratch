name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v6
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
    - name: Run bench
      run: cargo bench
    - name: Run Binaries
      run: |
        for bin in $(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[].targets[]
            | select(.kind[] == "bin")
            | .name'); do
          echo "Running $bin"
          cargo run --bin "$bin"
        done
